<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin jordan@jordaneldredge.com
    ServerName urlme.me

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5003/
    ProxyPassReverse / http://127.0.0.1:5003/

    ErrorLog ${APACHE_LOG_DIR}/urlme-error.log
    CustomLog ${APACHE_LOG_DIR}/access.log vhost_combined

SSLCertificateFile /etc/letsencrypt/live/urlme.me/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/urlme.me/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
